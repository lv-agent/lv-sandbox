name: probe-runner
# 一次性探针：探测 GitCode EulerOS runner 的真实能力，为自动发版定方案
# 探测项：docker/buildx、镜像 registry 可达性、rust 工具链、libseccomp-dev、出网

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  probe:
    runs-on: euleros-2.10.1
    steps:
      - name: OS 与架构
        run: |
          cat /etc/os-release 2>/dev/null | head -6
          echo "arch: $(uname -m)"

      - name: docker / buildx
        run: |
          if command -v docker >/dev/null 2>&1; then
            echo "docker: $(docker --version)"
            docker buildx version 2>/dev/null && echo "buildx: 有" || echo "buildx: 无"
            echo "--- daemon info ---"
            docker info 2>&1 | grep -E "Server Version|Registry Mirrors|Storage Driver|Operating System" || echo "daemon 不可连"
          else
            echo "docker: 未安装"
          fi

      - name: 镜像 registry 可达性
        run: |
          for m in registry-1.docker.io docker.m.daocloud.io docker.1panel.live docker.xuanyuan.me; do
            printf "%-32s " "$m"
            curl -s -o /dev/null -w "HTTP %{http_code} (%{time_total}s)\n" --connect-timeout 6 --max-time 10 "https://$m/v2/" 2>/dev/null || echo "FAIL"
          done

      - name: Rust 工具链
        run: |
          command -v rustc >/dev/null 2>&1 && rustc --version || echo "rustc: 无"
          command -v cargo >/dev/null 2>&1 && cargo --version || echo "cargo: 无"
          command -v rustup >/dev/null 2>&1 && rustup --version || echo "rustup: 无"

      - name: libseccomp 开发包
        run: |
          command -v pkg-config >/dev/null 2>&1 && pkg-config --modversion libseccomp 2>/dev/null || echo "libseccomp-dev(pkg-config): 无"
          (dnf list installed libseccomp-devel 2>/dev/null | tail -2) || (yum list installed libseccomp-devel 2>/dev/null | tail -2) || echo "libseccomp-devel(rpm): 无"

      - name: 出网测试
        run: |
          printf "baidu        " && curl -sI --connect-timeout 6 https://www.baidu.com 2>&1 | head -1 || echo "不可达"
          printf "rustup.rs    " && curl -sI --connect-timeout 6 https://sh.rustup.rs 2>&1 | head -1 || echo "不可达"
          printf "crates.io    " && curl -sI --connect-timeout 6 https://crates.io 2>&1 | head -1 || echo "不可达"
